name: Android Build & Release APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        validate-wrappers: false

    - name: Set up Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Found debug.keystore.base64, decoding..."
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore || openssl base64 -d -in debug.keystore.base64 -out debug.keystore
        fi
        
        if [ ! -f debug.keystore ]; then
          echo "debug.keystore not found, generating a new one..."
          keytool -genkey -v -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
        
        if [ -f debug.keystore ]; then
          echo "Successfully prepared debug.keystore"
        else
          echo "Failed to prepare debug.keystore"
          exit 1
        fi

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroPlayer-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v1.0.{0}', github.run_number) }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Continuous Build v1.0.{0}', github.run_number) }}
        body: |
          此 Release 為自動建置與發布。
          - 提交資訊: ${{ github.event.head_commit.message }}
          - 提交 SHA: ${{ github.sha }}
          - 來源分支: ${{ github.ref_name }}
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
